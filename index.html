```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena Ultimate</title>

<style>
/* =========================
   BASIC PAGE STYLING
========================= */
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

canvas {
  background:#222;
  display:block;
  margin:auto;
}

button {
  margin:5px;
  padding:10px;
  font-size:16px;
}

/* =========================
   UI PANEL
========================= */
#ui {
  padding:10px;
}
</style>

</head>
<body>

<div id="ui">
  <button onclick="startGame()">Start Game</button>
  <div id="stats"></div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

/* ============================================================
   CANVAS SETUP
============================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ============================================================
   GLOBAL GAME STATE
============================================================ */
let level = 1;
let gameState = "menu";
let cameraX = 0;

/* ============================================================
   PLAYER OBJECT
============================================================ */
let player = {
  x:100,
  y:400,
  vx:0,
  vy:0,
  r:15,
  speed:0.6,
  jump:-13,
  gravity:0.6,
  onGround:false,
  energy:100
};

/* ============================================================
   INPUT SYSTEM
============================================================ */
let keys = {};
let jumpPressed = false;

document.addEventListener("keydown", e=>{
  keys[e.key] = true;

  // SINGLE JUMP TRIGGER
  if(e.key===" " && !jumpPressed){
    if(player.onGround){
      player.vy = player.jump;
      player.onGround = false;
    }
    jumpPressed = true;
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key] = false;
  if(e.key===" ") jumpPressed = false;
});

/* ============================================================
   WORLD OBJECTS
============================================================ */
let platforms = [];
let enemies = [];
let boss = null;

let portal = {
  x:1800,
  y:430,
  w:80,
  h:120
};

/* ============================================================
   LEVEL GENERATION
============================================================ */
function generateLevel(){

  platforms = [];
  enemies = [];
  boss = null;

  // ----- GROUND -----
  platforms.push({x:0,y:550,w:2000,h:50});

  // ----- LEVEL DESIGNS -----
  if(level === 1){
    platforms.push({x:300,y:500,w:120,h:20});
    platforms.push({x:600,y:450,w:120,h:20});
  }

  if(level === 2){
    for(let i=0;i<5;i++){
      platforms.push({
        x:300 + i*200,
        y:500 - i*40,
        w:120,
        h:20
      });
    }
  }

  if(level === 3){
    for(let i=0;i<5;i++){
      platforms.push({
        x:300 + i*300,
        y:500,
        w:120,
        h:20
      });
    }
  }

  if(level === 4){
    for(let i=0;i<5;i++){
      platforms.push({
        x:600,
        y:500 - i*80,
        w:120,
        h:20
      });
    }
  }

  if(level === 5){
    platforms.push({x:1200,y:400,w:200,h:20});
  }

  // ----- PORTAL -----
  portal.x = 1800;
  portal.y = 430;

  // ----- ENEMIES -----
  if(level < 5){
    for(let i=0;i<level+2;i++){
      enemies.push({
        x:400 + i*200,
        y:520,
        dir:1,
        speed:1.2
      });
    }
  }

  // ----- BOSS -----
  if(level === 5){
    boss = {
      x:1500,
      y:300,
      r:25,
      hp:40
    };
  }
}

/* ============================================================
   PLAYER MOVEMENT
============================================================ */
function movePlayer(){

  // LEFT RIGHT
  if(keys["ArrowLeft"]) player.vx -= player.speed;
  if(keys["ArrowRight"]) player.vx += player.speed;

  // FRICTION
  player.vx *= 0.9;

  // VARIABLE JUMP HEIGHT
  if(!keys[" "] && player.vy < 0){
    player.vy += 0.4;
  }

  // GRAVITY
  player.vy += player.gravity;

  // APPLY
  player.x += player.vx;
  player.y += player.vy;

  // COLLISION
  player.onGround = false;

  platforms.forEach(p=>{
    if(player.vy >= 0 &&
       player.x > p.x &&
       player.x < p.x+p.w &&
       player.y + player.r > p.y &&
       player.y + player.r < p.y + 20){

      player.y = p.y - player.r;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // FLOOR LOCK
  if(player.y > 550 - player.r){
    player.y = 550 - player.r;
    player.vy = 0;
    player.onGround = true;
  }

  // WALL LIMITS
  if(player.x < 0) player.x = 0;
  if(player.x > 2000) player.x = 2000;
}

/* ============================================================
   ENEMY LOGIC
============================================================ */
function moveEnemies(){
  enemies.forEach(e=>{
    e.x += e.dir * e.speed;

    if(e.x < 50 || e.x > 1950){
      e.dir *= -1;
    }

    if(Math.abs(player.x - e.x) < 20 &&
       Math.abs(player.y - e.y) < 20){
      player.energy -= 0.5;
    }
  });
}

/* ============================================================
   BOSS LOGIC
============================================================ */
function moveBoss(){
  if(!boss) return;

  let dx = player.x - boss.x;
  let dy = player.y - boss.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  boss.x += dx/dist * 1.5;
  boss.y += dy/dist * 1.5;

  if(Math.abs(player.x - boss.x) < 30 &&
     Math.abs(player.y - boss.y) < 30 &&
     player.vy > 0){

    boss.hp--;
    player.vy = -8;
  }

  if(boss.hp <= 0){
    gameState = "win";
  }
}

/* ============================================================
   PORTAL SYSTEM
============================================================ */
function checkPortal(){
  if(
    player.x + player.r > portal.x &&
    player.x - player.r < portal.x + portal.w &&
    player.y + player.r > portal.y &&
    player.y - player.r < portal.y + portal.h
  ){
    level++;

    if(level > 5){
      gameState = "win";
      return;
    }

    player.x = 100;
    player.y = 400;

    generateLevel();
  }
}

/* ============================================================
   DRAW FUNCTIONS
============================================================ */
function draw(){

  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,250);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.fillText("GAME OVER",350,250);
    return;
  }

  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.fillText("YOU WIN!",350,250);
    return;
  }

  ctx.save();
  ctx.translate(-cameraX,0);

  // platforms
  ctx.fillStyle="#555";
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  // portal
  ctx.fillStyle="yellow";
  ctx.fillRect(portal.x,portal.y,portal.w,portal.h);

  // enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  // boss
  if(boss){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
    ctx.fill();
  }

  // player
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  ctx.fillStyle="white";
  ctx.fillText("Level: "+level+" HP: "+Math.floor(player.energy),20,20);
}

/* ============================================================
   MAIN LOOP
============================================================ */
function loop(){

  movePlayer();
  moveEnemies();
  moveBoss();
  checkPortal();

  cameraX += (player.x - 400 - cameraX) * 0.1;

  draw();

  if(player.energy <= 0){
    gameState="gameover";
    return;
  }

  requestAnimationFrame(loop);
}

/* ============================================================
   START GAME
============================================================ */
function startGame(){
  gameState="playing";
  level=1;
  player.energy=100;
  generateLevel();
  loop();
}

</script>

</body>
</html>
