```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena - Final Game</title>
<style>
body { margin:0; background:#111; color:white; font-family:Arial; text-align:center; overflow:hidden; }
canvas { background:#222; display:block; margin:auto; }
#ui { padding:10px; }
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<div id="ui">
<button onclick="startGame()">Start</button>
<button onclick="document.documentElement.requestFullscreen()">Fullscreen</button>
<div id="stats"></div>
<div id="question"></div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let gameState="menu";
let level=1;
let score=0;
let cameraX=0;
let shake=0;
let flash=0;

// ===== PLAYER =====
let player={
  x:100,y:500,vx:0,vy:0,
  energy:10000,
  jump:-14,gravity:0.6,
  jumps:0,maxJumps:2
};

let checkpoint={x:100,y:500};

// ===== INPUT =====
const keys={};
let jumpPressed=false;
let shootCooldown=0;

document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(e.key===" "&&!jumpPressed){
    if(player.jumps<player.maxJumps){
      player.vy=player.jump;
      player.jumps++;
    }
    jumpPressed=true;
  }

  if(e.key==="f"&&shootCooldown<=0){
    bullets.push({x:player.x,y:player.y,vx:7});
    shootCooldown=15;
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key]=false;
  if(e.key===" ") jumpPressed=false;
});

// ===== OBJECTS =====
let dogs=[],bullets=[],bossBullets=[],coins=[];
let portal={x:1800,y:200,w:30,h:200};

// ===== LEVEL =====
function setupLevel(){
  dogs=[];
  for(let i=0;i<level+2;i++){
    dogs.push({x:300+i*300,y:520,dir:1,speed:1});
  }

  if(level===5){
    dogs=[{x:1500,y:300,hp:60,speed:2,boss:true,shootCooldown:0}];
  }

  coins=[];
  for(let i=0;i<15;i++){
    coins.push({x:Math.random()*2000,y:Math.random()*400+100});
  }
}

// ===== MATH =====
let currentQ,combo=0;

function makeQuestion(){
  let a=Math.floor(Math.random()*10)+1;
  let b=Math.floor(Math.random()*10)+1;
  let correct=a+b;

  let answers=[correct,correct+2,correct-1,correct+3];
  answers.sort(()=>Math.random()-0.5);

  currentQ={correct};

  let html="<b>"+a+" + "+b+" = ?</b><br>";
  answers.forEach(ans=>{
    html+=`<button onclick="check(${ans})">${ans}</button>`;
  });

  document.getElementById("question").innerHTML=html;
}

function check(ans){
  if(ans===currentQ.correct){
    combo++;
    player.energy+=400+combo*100;
    score+=50;
  }else{
    combo=0;
    player.energy-=300;
    shake=10;
    flash=10;
  }
  makeQuestion();
}

// ===== MOVE =====
function move(){
  if(gameState!=="playing") return;

  if(keys["ArrowLeft"]) player.vx-=0.4;
  if(keys["ArrowRight"]) player.vx+=0.4;

  player.vx*=0.9;
  player.vy+=player.gravity;

  player.x+=player.vx;
  player.y+=player.vy;

  if(player.y>700){
    player.x=checkpoint.x;
    player.y=checkpoint.y;
    player.energy-=300;
  }

  if(player.y>550){
    player.y=550;
    player.vy=0;
    player.jumps=0;
  }

  player.energy-=0.2;
}

// ===== ENEMIES =====
function moveDogs(){
  dogs.forEach(d=>{
    if(d.boss){
      let dx=player.x-d.x;
      let dy=player.y-d.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      d.x+=(dx/dist)*d.speed;
      d.y+=(dy/dist)*d.speed;

      d.y+=Math.sin(Date.now()*0.005);

      if(d.hp<15) d.speed=3;

      d.shootCooldown--;
      if(d.shootCooldown<=0){
        bossBullets.push({x:d.x,y:d.y,vx:dx>0?6:-6,vy:dy*0.05});
        d.shootCooldown=40;
      }

    }else{
      d.x+=d.dir*d.speed;
      if(d.x<0||d.x>2000) d.dir*=-1;
    }
  });
}

// ===== BULLETS =====
function moveBullets(){
  bullets.forEach(b=>b.x+=b.vx);
}

// ===== DRAW =====
function draw(){

  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,250);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",350,250);
    return;
  }

  ctx.save();
  ctx.translate(-cameraX,0);

  ctx.fillStyle="#444";
  ctx.fillRect(0,550,2000,50);

  // coins
  coins.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();
  });

  // enemies
  dogs.forEach(d=>{
    ctx.fillStyle=d.boss?"purple":"brown";
    ctx.fillRect(d.x-15,d.y-15,30,30);
  });

  // bullets
  bullets.forEach(b=>{
    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,5,5);
  });

  // ⭐ PLAYER CHARACTER (REAL SHAPE)
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x-15,player.y-20,30,40); // body
  ctx.fillStyle="white";
  ctx.fillRect(player.x-10,player.y-25,8,8); // eye
  ctx.fillRect(player.x+2,player.y-25,8,8); // eye

  ctx.restore();

  // health bar
  ctx.fillStyle="black";
  ctx.fillRect(20,20,200,20);
  ctx.fillStyle="lime";
  ctx.fillRect(20,20,player.energy/50,20);

  // effects
  if(flash>0){
    ctx.fillStyle="rgba(255,0,0,0.3)";
    ctx.fillRect(0,0,1000,600);
    flash--;
  }
}

// ===== LOOP =====
function loop(){
  move();
  moveDogs();
  moveBullets();

  cameraX += (player.x-400-cameraX)*0.1;

  if(shootCooldown>0) shootCooldown--;

  draw();

  document.getElementById("stats").innerText =
    "Level:"+level+" Energy:"+Math.floor(player.energy)+" Score:"+score;

  if(player.energy<=0){
    gameState="gameover";
    return;
  }

  requestAnimationFrame(loop);
}

// ===== START =====
function startGame(){
  gameState="playing";
  setupLevel();
  makeQuestion();
  loop();
}
</script>

</body>
</html>
```
