<!DOCTYPE html>
<html>
<head>
<title>Ball Arena FINAL COMPLETE</title>
<style>
body { margin:0; background:#111; color:white; text-align:center; }
canvas { background:#222; display:block; margin:auto; }
</style>
</head>
<body>

<h2>Ball Arena 🎮</h2>
<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameState = "menu";
let level = 1;

// PLAYER
let player = {
  x:100,y:400,
  vx:0,vy:0,
  r:15,
  speed:0.5,
  jump:-8,
  gravity:0.4,
  onGround:false,
  hp:100
};

let keys = {};
let jumpBuffer = 0;
let coyoteTime = 0;

// WORLD
let platforms = [];
let enemies = [];
let boss = null;
let portal = {x:900,y:450,w:60,h:100};

// INPUT
document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(e.key===" ") jumpBuffer=8;
});
document.addEventListener("keyup", e=>{
  keys[e.key]=false;
});

canvas.addEventListener("click", ()=>{
  if(gameState!=="playing") startGame();
});

// START
function startGame(){
  level=1;
  player.hp=100;
  loadLevel();
  gameState="playing";
}

// =====================
// LEVELS
// =====================
function loadLevel(){

  platforms=[];
  enemies=[];
  boss=null;

  platforms.push({x:0,y:550,w:1000,h:50});

  // LEVEL 1
  if(level===1){
    platforms.push({x:200,y:480,w:120,h:20});
    platforms.push({x:400,y:430,w:120,h:20});
  }

  // LEVEL 2
  if(level===2){
    for(let i=0;i<4;i++){
      platforms.push({x:200+i*180,y:500-i*50,w:120,h:20});
    }
  }

  // LEVEL 3
  if(level===3){
    for(let i=0;i<5;i++){
      platforms.push({x:100+i*180,y:400+(i%2)*80,w:120,h:20});
    }
  }

  // LEVEL 4
  if(level===4){
    for(let i=0;i<5;i++){
      platforms.push({x:300,y:500-i*80,w:120,h:20});
    }
  }

  // LEVEL 5 BOSS
  if(level===5){
    platforms.push({x:400,y:400,w:200,h:20});
    boss = {x:700,y:300,r:30,hp:20,speed:1.2};
  }

  // LEVEL 6 (zig-zag)
  if(level===6){
    platforms.push({x:150,y:500,w:120,h:20});
    platforms.push({x:350,y:450,w:120,h:20});
    platforms.push({x:200,y:380,w:120,h:20});
    platforms.push({x:450,y:320,w:120,h:20});
    platforms.push({x:300,y:260,w:120,h:20});
  }

  // LEVEL 7 (big gaps)
  if(level===7){
    platforms.push({x:200,y:500,w:100,h:20});
    platforms.push({x:400,y:450,w:100,h:20});
    platforms.push({x:600,y:400,w:100,h:20});
    platforms.push({x:800,y:350,w:100,h:20});
  }

  // LEVEL 8 (alternating)
  if(level===8){
    platforms.push({x:150,y:500,w:120,h:20});
    platforms.push({x:300,y:420,w:120,h:20});
    platforms.push({x:450,y:500,w:120,h:20});
    platforms.push({x:600,y:420,w:120,h:20});
    platforms.push({x:750,y:500,w:120,h:20});
  }

  // LEVEL 9 (vertical tower)
  if(level===9){
    platforms.push({x:400,y:500,w:120,h:20});
    platforms.push({x:400,y:420,w:120,h:20});
    platforms.push({x:400,y:340,w:120,h:20});
    platforms.push({x:400,y:260,w:120,h:20});
  }

  // LEVEL 10 FINAL BOSS
  if(level===10){
    platforms.push({x:350,y:400,w:300,h:20});
    boss = {x:700,y:250,r:35,hp:50,speed:2};
  }

  // ENEMIES
  if(!boss){
    for(let i=0;i<Math.min(level,5);i++){
      enemies.push({
        x:200+i*150,
        y:520,
        dir:1,
        speed:1.2
      });
    }
  }

  portal.x=900;
  portal.y=450;

  player.x=100;
  player.y=400;
}

// =====================
// PLAYER
// =====================
function movePlayer(){

  if(keys["ArrowLeft"]) player.vx -= player.speed;
  if(keys["ArrowRight"]) player.vx += player.speed;

  player.vx *= 0.9;
  player.vy += player.gravity;

  player.x += player.vx;
  player.y += player.vy;

  player.onGround=false;

  platforms.forEach(p=>{
    if(player.vy>=0 &&
       player.x>p.x &&
       player.x<p.x+p.w &&
       player.y+player.r>p.y &&
       player.y+player.r<p.y+20){
      player.y=p.y-player.r;
      player.vy=0;
      player.onGround=true;
    }
  });

  if(player.onGround) coyoteTime=8;
  else coyoteTime--;

  if(jumpBuffer>0) jumpBuffer--;

  if(jumpBuffer>0 && coyoteTime>0){
    player.vy=player.jump;
    jumpBuffer=0;
    coyoteTime=0;
  }

  if(!keys[" "] && player.vy<0){
    player.vy+=0.3;
  }

  if(player.y>550-player.r){
    player.y=550-player.r;
    player.vy=0;
    player.onGround=true;
  }

  if(player.x<0) player.x=0;
  if(player.x>1000) player.x=1000;
}

// =====================
// ENEMIES
// =====================
function moveEnemies(){

  for(let i=enemies.length-1;i>=0;i--){
    let e = enemies[i];

    e.x += e.dir * e.speed;

    if(e.x<50||e.x>950) e.dir*=-1;

    let dx=Math.abs(player.x-e.x);
    let dy=player.y-e.y;

    if(dx<20 && dy<0 && dy>-30 && player.vy>0){
      enemies.splice(i,1);
      player.vy=-7;
      continue;
    }

    if(dx<20 && Math.abs(dy)<20){
      player.hp -= 0.5;
    }
  }
}

// =====================
// BOSS
// =====================
function moveBoss(){
  if(!boss) return;

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  boss.x += dx/dist * boss.speed;
  boss.y += dy/dist * boss.speed;

  if(Math.abs(player.x-boss.x)<35 &&
     Math.abs(player.y-boss.y)<35 &&
     player.vy>0){
    boss.hp--;
    player.vy=-8;
  }

  if(Math.abs(player.x-boss.x)<35 &&
     Math.abs(player.y-boss.y)<35){
    player.hp -= 1;
  }

  if(boss.hp<=0){

    if(level===5){
      player.hp = 100; // ⭐ reset health after first boss
    }

    if(level===10){
      gameState="win";
    } else {
      level++;
      loadLevel();
    }
  }
}

// =====================
// PORTAL
// =====================
function checkPortal(){
  if(!boss && player.x>portal.x){
    level++;
    loadLevel();
  }
}

// =====================
// DRAW
// =====================
function draw(){

  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,200);
    ctx.font="20px Arial";
    ctx.fillText("Click to Start",420,300);
    return;
  }

  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.font="40px Arial";
    ctx.fillText("YOU BEAT ALL 10 LEVELS!",250,250);
    ctx.font="20px Arial";
    ctx.fillText("Click to Restart",400,320);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",360,250);
    ctx.font="20px Arial";
    ctx.fillText("Click to Restart",400,320);
    return;
  }

  ctx.fillStyle="#555";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  if(!boss){
    ctx.fillStyle="yellow";
    ctx.fillRect(portal.x,portal.y,portal.w,portal.h);
  }

  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  if(boss){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText("Boss HP: "+boss.hp,450,50);
  }

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillText("Level: "+level+" HP:"+Math.floor(player.hp),20,20);
}

// =====================
// LOOP
// =====================
function loop(){

  if(gameState==="playing"){
    movePlayer();
    moveEnemies();
    moveBoss();
    checkPortal();

    if(player.hp<=0){
      gameState="gameover";
    }
  }

  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
```
