<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine - No Clip Final</title>

<style>
body{margin:0;overflow:hidden;}

#overlay{
 position:absolute;inset:0;background:#000;color:#fff;
 display:flex;align-items:center;justify-content:center;
 cursor:pointer;
}

#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,10);
scene.add(light);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== BLOCKS =====
const BLOCK_GEO=new THREE.BoxGeometry(1,1,1);
const BLOCK_MAT=new THREE.MeshLambertMaterial({color:0x3cb043});

// ===== PLAYER =====
const player={width:0.6,depth:0.6,height:1.8};
let velY=0,onGround=false;

const gravity=-0.015;
const jump=0.22;

// ===== WORLD =====
const CHUNK=16;
const RENDER_DIST=3;

const chunks=new Map();
const chunkData=new Map();
const world=new Map();

const key=(x,y,z)=>`${x},${y},${z}`;
const ckey=(x,z)=>`${x},${z}`;

// ===== NOISE =====
function noise(x,z){
 return (Math.sin(x*0.05)+Math.cos(z*0.05))*6;
}

// ===== EXPOSED =====
function isExposed(x,y,z,data){
 return !(
  data[key(x+1,y,z)] &&
  data[key(x-1,y,z)] &&
  data[key(x,y+1,z)] &&
  data[key(x,y-1,z)] &&
  data[key(x,y,z+1)] &&
  data[key(x,y,z-1)]
 );
}

// ===== CREATE CHUNK =====
function createChunk(cx,cz){

 const inst=new THREE.InstancedMesh(BLOCK_GEO,BLOCK_MAT,6000);
 const dummy=new THREE.Object3D();

 let data={};
 let i=0;

 for(let x=0;x<CHUNK;x++){
  for(let z=0;z<CHUNK;z++){

   let wx=cx*CHUNK+x;
   let wz=cz*CHUNK+z;
   let h=Math.floor(noise(wx,wz));

   for(let y=-6;y<=h;y++){
    const k=key(wx,y,wz);
    data[k]=1;
    world.set(k,1);
   }
  }
 }

 for(const k in data){
  const [x,y,z]=k.split(",").map(Number);
  if(isExposed(x,y,z,data)){
   dummy.position.set(x,y,z);
   dummy.updateMatrix();
   inst.setMatrixAt(i++,dummy.matrix);
  }
 }

 inst.count=i;
 inst.instanceMatrix.needsUpdate=true;

 scene.add(inst);
 chunks.set(ckey(cx,cz),inst);
 chunkData.set(ckey(cx,cz),data);
}

// ===== REBUILD =====
function rebuildChunk(cx,cz){

 const id=ckey(cx,cz);
 const old=chunks.get(id);
 if(old) scene.remove(old);

 const data=chunkData.get(id);
 if(!data) return;

 const inst=new THREE.InstancedMesh(BLOCK_GEO,BLOCK_MAT,6000);
 const dummy=new THREE.Object3D();

 let i=0;

 for(const k in data){
  const [x,y,z]=k.split(",").map(Number);
  if(isExposed(x,y,z,data)){
   dummy.position.set(x,y,z);
   dummy.updateMatrix();
   inst.setMatrixAt(i++,dummy.matrix);
  }
 }

 inst.count=i;
 inst.instanceMatrix.needsUpdate=true;

 scene.add(inst);
 chunks.set(id,inst);
}

// ===== LOAD / UNLOAD =====
function updateChunks(){

 const cx=Math.floor(camera.position.x/CHUNK);
 const cz=Math.floor(camera.position.z/CHUNK);

 for(let x=-RENDER_DIST;x<=RENDER_DIST;x++){
  for(let z=-RENDER_DIST;z<=RENDER_DIST;z++){
   const id=ckey(cx+x,cz+z);
   if(!chunks.has(id)){
    createChunk(cx+x,cz+z);
   }
  }
 }
}

function unloadChunks(){

 const cx=Math.floor(camera.position.x/CHUNK);
 const cz=Math.floor(camera.position.z/CHUNK);

 for(const id of chunks.keys()){
  const [x,z]=id.split(",").map(Number);
  if(Math.abs(x-cx)>RENDER_DIST+1 || Math.abs(z-cz)>RENDER_DIST+1){
   scene.remove(chunks.get(id));
   chunks.delete(id);
   chunkData.delete(id);
  }
 }
}

// ===== SOLID CHECK =====
function solid(x,y,z){
 return world.has(`${x},${y},${z}`);
}

// ===== MOVE (NO CLIP) =====
function move(dx,dz){

 let pos=camera.position;

 // X
 pos.x+=dx;
 if(solid(Math.floor(pos.x),Math.floor(pos.y-1),Math.floor(pos.z))){
  pos.x-=dx;
 }

 // Z
 pos.z+=dz;
 if(solid(Math.floor(pos.x),Math.floor(pos.y-1),Math.floor(pos.z))){
  pos.z-=dz;
 }

}

// ===== GRAVITY (NO CLIP) =====
function applyGravity(){

 velY+=gravity;
 let pos=camera.position;

 pos.y+=velY;

 let footY=Math.floor(pos.y-player.height);
 let headY=Math.floor(pos.y);

 onGround=false;

 // falling
 if(velY<=0){
  if(solid(Math.floor(pos.x),footY,Math.floor(pos.z))){
   pos.y=footY+1+player.height;
   velY=0;
   onGround=true;
  }
 }

 // jumping
 else{
  if(solid(Math.floor(pos.x),headY,Math.floor(pos.z))){
   pos.y=headY;
   velY=0;
  }
 }

}

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>document.body.requestPointerLock();

document.addEventListener("pointerlockchange",()=>{
 overlay.style.display=document.pointerLockElement?"none":"flex";
});

// ===== INPUT =====
const k={w:false,a:false,s:false,d:false};

onkeydown=e=>{
 if(e.code==="KeyW")k.w=true;
 if(e.code==="KeyA")k.a=true;
 if(e.code==="KeyS")k.s=true;
 if(e.code==="KeyD")k.d=true;

 if(e.code==="Space"&&onGround){
  velY=jump;
 }
};

onkeyup=e=>{
 if(e.code==="KeyW")k.w=false;
 if(e.code==="KeyA")k.a=false;
 if(e.code==="KeyS")k.s=false;
 if(e.code==="KeyD")k.d=false;
};

// ===== BLOCK EDIT =====
const ray=new THREE.Raycaster();

addEventListener("mousedown",e=>{

 ray.setFromCamera({x:0,y:0},camera);
 const hits=ray.intersectObjects([...chunks.values()]);
 if(!hits.length) return;

 const hit=hits[0];
 const p=hit.point.clone().floor();
 const n=hit.face.normal.clone();

 const bx=p.x,by=p.y,bz=p.z;

 const cx=Math.floor(bx/CHUNK);
 const cz=Math.floor(bz/CHUNK);

 const data=chunkData.get(ckey(cx,cz));

 // break
 if(e.button===0){
  const k=key(bx,by,bz);
  if(data && data[k]){
   delete data[k];
   world.delete(k);
   rebuildChunk(cx,cz);
  }
 }

 // place
 if(e.button===2){
  const px=bx+n.x;
  const py=by+n.y;
  const pz=bz+n.z;

  const pcx=Math.floor(px/CHUNK);
  const pcz=Math.floor(pz/CHUNK);

  const pdata=chunkData.get(ckey(pcx,pcz));
  const k=key(px,py,pz);

  if(pdata && !pdata[k]){
   pdata[k]=1;
   world.set(k,1);
   rebuildChunk(pcx,pcz);
  }
 }

});

addEventListener("contextmenu",e=>e.preventDefault());

// ===== START =====
camera.position.set(0,10,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateChunks();
 unloadChunks();

 const speed=0.12;

 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y=0;
 dir.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(k.w){dx+=dir.x*speed;dz+=dir.z*speed;}
 if(k.s){dx-=dir.x*speed;dz-=dir.z*speed;}
 if(k.a){dx-=right.x*speed;dz-=right.z*speed;}
 if(k.d){dx+=right.x*speed;dz+=right.z*speed;}

 move(dx,dz);
 applyGravity();

 renderer.render(scene,camera);
}
animate();

onresize=()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
};

</script>
</body>
</html>
