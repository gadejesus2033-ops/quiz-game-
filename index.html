```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena - TRUE FINAL</title>
<style>
body { margin:0; background:#111; color:white; text-align:center; overflow:hidden; font-family:Arial;}
canvas { background:#222; display:block; margin:auto; }
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<button onclick="startGame()">Start</button>
<button onclick="document.documentElement.requestFullscreen()">Fullscreen</button>
<div id="stats"></div>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let gameState="menu";
let level=1;
let cameraX=0;

// ===== PLAYER =====
let player={
  x:100,y:400,
  vx:0,vy:0,
  speed:0.5,
  jumpPower:-12,
  gravity:0.6,
  onGround:false,
  energy:100
};

let jumpHeld=false;
const keys={};

// ===== WORLD =====
let platforms=[], enemies=[], bullets=[], boss=null;
let portal={x:1800,y:200,w:40,h:80};

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(e.key===" ") jumpHeld=true;

  if(e.key==="f"){
    bullets.push({x:player.x,y:player.y,vx:6});
  }
});
document.addEventListener("keyup",e=>{
  keys[e.key]=false;
  if(e.key===" ") jumpHeld=false;
});

// ===== LEVEL GEN =====
function generateLevel(){
  platforms=[];
  enemies=[];
  boss=null;

  // ground
  platforms.push({x:0,y:550,w:2000,h:50});

  // random platforms
  for(let i=0;i<8;i++){
    platforms.push({
      x:200+i*200,
      y:250+Math.random()*250,
      w:120,
      h:20
    });
  }

  portal.x=1800;

  if(level<5){
    for(let i=0;i<level+2;i++){
      enemies.push({x:300+i*250,y:520,dir:1});
    }
  }else{
    boss={
      x:1500,y:300,
      hp:50,
      shootCooldown:0
    };
  }
}

// ===== PLAYER MOVE =====
function movePlayer(){

  if(keys["ArrowLeft"]) player.vx-=player.speed;
  if(keys["ArrowRight"]) player.vx+=player.speed;

  player.vx*=0.9;

  // jump start
  if(keys[" "] && player.onGround){
    player.vy=player.jumpPower;
    player.onGround=false;
  }

  // variable jump height
  if(!jumpHeld && player.vy<0){
    player.vy+=0.5;
  }

  player.vy+=player.gravity;

  player.x+=player.vx;
  player.y+=player.vy;

  // collisions
  player.onGround=false;
  platforms.forEach(p=>{
    if(player.x>p.x && player.x<p.x+p.w &&
       player.y+20>p.y && player.y<p.y+p.h){
      player.y=p.y-20;
      player.vy=0;
      player.onGround=true;
    }
  });

  // fall reset
  if(player.y>700){
    player.x=100;
    player.y=400;
    player.energy-=10;
  }
}

// ===== ENEMIES =====
function moveEnemies(){
  enemies.forEach(e=>{
    e.x+=e.dir*1;
    if(e.x<0||e.x>2000) e.dir*=-1;

    if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
      player.energy-=1;
    }
  });
}

// ===== BOSS =====
function moveBoss(){
  if(!boss) return;

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  boss.x += dx/dist*1.5;
  boss.y += dy/dist*1.5;

  boss.shootCooldown--;

  if(boss.shootCooldown<=0){
    bullets.push({
      x:boss.x,
      y:boss.y,
      vx:dx/dist*4,
      vy:dy/dist*4,
      enemy:true
    });
    boss.shootCooldown=50;
  }

  // stomp damage
  if(Math.abs(player.x-boss.x)<30 && Math.abs(player.y-boss.y)<30 && player.vy>0){
    boss.hp--;
    player.vy=-8;
  }

  if(boss.hp<=0){
    gameState="win";
  }
}

// ===== BULLETS =====
function moveBullets(){
  bullets.forEach((b,i)=>{
    b.x+=b.vx;
    b.y+=b.vy||0;

    if(b.enemy){
      if(Math.abs(player.x-b.x)<15 && Math.abs(player.y-b.y)<15){
        player.energy-=5;
      }
    }else{
      enemies.forEach((e,j)=>{
        if(Math.abs(b.x-e.x)<15 && Math.abs(b.y-e.y)<15){
          enemies.splice(j,1);
        }
      });

      if(boss && Math.abs(b.x-boss.x)<25 && Math.abs(b.y-boss.y)<25){
        boss.hp--;
      }
    }
  });
}

// ===== PORTAL =====
function checkPortal(){
  if(player.x>portal.x &&
     player.y>portal.y &&
     player.y<portal.y+portal.h){

    level++;

    if(level>5){
      gameState="win";
      return;
    }

    player.x=100;
    player.y=400;
    generateLevel();
  }
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,250);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.fillText("GAME OVER",350,250);
    return;
  }

  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.fillText("YOU WIN!",350,250);
    return;
  }

  ctx.save();
  ctx.translate(-cameraX,0);

  // platforms
  ctx.fillStyle="#555";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  // portal
  ctx.fillStyle="gold";
  ctx.fillRect(portal.x,portal.y,portal.w,portal.h);

  // enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>ctx.fillRect(e.x-10,e.y-10,20,20));

  // boss
  if(boss){
    ctx.fillStyle="purple";
    ctx.fillRect(boss.x-25,boss.y-25,50,50);
  }

  // bullets
  ctx.fillStyle="orange";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5));

  // player
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x-15,player.y-20,30,40);

  ctx.restore();

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Level: "+level,20,20);
  ctx.fillText("HP: "+player.energy,20,40);
}

// ===== LOOP =====
function loop(){
  movePlayer();
  moveEnemies();
  moveBoss();
  moveBullets();
  checkPortal();

  cameraX += (player.x-400-cameraX)*0.1;

  draw();

  if(player.energy<=0){
    gameState="gameover";
    return;
  }

  requestAnimationFrame(loop);
}

// ===== START =====
function startGame(){
  gameState="playing";
  level=1;
  player.energy=100;
  generateLevel();
  loop();
}
</script>

</body>
</html>
