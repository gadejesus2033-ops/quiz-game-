<!DOCTYPE html>

<html>
<head>
  <title>Ball Arena FINAL</title>
  <style>
    body { margin:0; background:#111; color:white; font-family:Arial; overflow:hidden; text-align:center; }
    canvas { background:#222; display:block; margin:auto; }
    #ui { padding:10px; }
    button { margin:5px; padding:8px; }
  </style>
</head>
<body>

<div id="ui">
  <button onclick="startGame()">Start</button>
  <div id="stats"></div>
  <div id="question"></div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;

let player = {
  x:100,
  y:500,
  vx:0,
  vy:0,
  energy:1500,
  speed:3,
  jump:-9,
  onGround:false
};

const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// 🧱 PLATFORMS
function getPlatforms() {
  return [
    {x:0,y:550,w:1000,h:50},
    {x:200,y:450,w:150,h:20},
    {x:400,y:380,w:150,h:20},
    {x:650,y:320,w:150,h:20}
  ];
}

// 💀 DOGS
function getDogs() {
  let speed = 0.6 + level * 0.15;

  return [
    {x:300,y:520,dir:1,speed},
    {x:600,y:520,dir:-1,speed},
    {x:800,y:520,dir:1,speed}
  ];
}

let dogs = getDogs();

// 🧠 QUESTIONS
let currentQ;

function makeQuestion() {
  let a = Math.floor(Math.random()*10)+1;
  let b = Math.floor(Math.random()*10)+1;

  let correct = a + b;
  let wrong = [correct+3, correct-2, correct+5];

  let answers = [correct, ...wrong];
  answers.sort(()=>Math.random()-0.5);

  currentQ = { text:`${a} + ${b} = ?`, correct, answers };

  let html = "<b>" + currentQ.text + "</b><br>";

  answers.forEach(ans=>{
    html += `<button onclick="check(${ans})">${ans}</button>`;
  });

  document.getElementById("question").innerHTML = html;
}

function check(ans){
  if(ans === currentQ.correct){
    player.energy += 1000;
  } else {
    player.energy -= 300;
  }
  makeQuestion();
}

// 🎮 START
function startGame(){
  makeQuestion();
  loop();
}

// 🎮 MOVE
function move(){
  if(player.energy<=0) return;

  let moving=false;

  if(keys["ArrowLeft"]){
    player.vx=-player.speed;
    moving=true;
  }
  else if(keys["ArrowRight"]){
    player.vx=player.speed;
    moving=true;
  }
  else player.vx*=0.8;

  if(moving) player.energy -= 10;

  if(keys[" "] && player.onGround){
    player.vy=player.jump;
    player.onGround=false;
  }

  player.vy += 0.35;

  player.x += player.vx;
  player.y += player.vy;

  player.onGround=false;

  for(let p of getPlatforms()){
    if(player.x>p.x && player.x<p.x+p.w &&
       player.y+15>p.y && player.y<p.y+p.h){
      player.y=p.y-15;
      player.vy=0;
      player.onGround=true;
    }
  }
}

// 💀 ENEMIES + COMBAT
function moveDogs(){
  dogs.forEach((d,index)=>{
    d.x += d.dir*d.speed;

    if(d.x<0 || d.x>950) d.dir*=-1;

    let dx = Math.abs(player.x - d.x);
    let dy = player.y - d.y;

    // ⚔️ STOMP
    if(dx < 25 && dy > -25 && dy < 0 && player.vy > 0){
      dogs.splice(index,1);
      player.vy = -6;
      player.energy += 100;
      return;
    }

    // 💀 DAMAGE
    if(dx < 25 && Math.abs(player.y - d.y) < 25){
      player.energy -= 10;
    }
  });
}

// 🏁 LEVEL SYSTEM
function checkLevel(){
  if(player.x>950){
    level++;

    if(level>5){
      alert("YOU BEAT ALL LEVELS!");
      level=1;
    }

    player.x=100;
    player.y=500;
    player.energy+=400;

    dogs=getDogs();
  }
}

// 🎨 DRAW
function draw(){
  ctx.clearRect(0,0,1000,600);

  ctx.fillStyle="#444";
  getPlatforms().forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  ctx.fillStyle="gold";
  ctx.fillRect(950,200,30,200);

  ctx.fillStyle="brown";
  dogs.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,15,0,Math.PI*2);
    ctx.fill();
  });

  ctx.beginPath();
  ctx.arc(player.x,player.y,15,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();
}

// 🔁 LOOP
function loop(){
  move();
  moveDogs();
  checkLevel();
  draw();

  document.getElementById("stats").innerText =
    "Level: "+level+" | Energy: "+player.energy;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
