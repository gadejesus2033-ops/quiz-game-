```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena ULTIMATE FINAL v2</title>
<style>
body{margin:0;background:#111;color:white;text-align:center;font-family:Arial;}
#gameContainer{display:flex;justify-content:center;}
canvas{background:#222;}

#controls{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:10px;
}

#controls button{
  font-size:24px;
  padding:15px 25px;
  border-radius:10px;
  border:none;
  background:#333;
  color:white;
}

@media (max-width:600px){
  canvas{width:100%;height:auto;}
  #controls button{font-size:28px;padding:20px 30px;}
}
</style>
</head>

<body>

<h2>Ball Arena 🎮</h2>

<div id="gameContainer">
<canvas id="game" width="1000" height="600"></canvas>
</div>

<div id="controls">
<button id="leftBtn">⬅️</button>
<button id="jumpBtn">🦘</button>
<button id="rightBtn">➡️</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let gameState="menu";
let level=1;

// PLAYER
let player={
  x:100,y:400,
  vx:0,vy:0,
  r:15,
  speed:0.5,
  jump:-8,
  gravity:0.4,
  onGround:false,
  hp:100
};

let keys={},jumpBuffer=0,coyoteTime=0;
let touchLeft=false,touchRight=false;

// WORLD
let platforms=[],enemies=[],boss=null,bossBullets=[];
let portal={x:900,y:450,w:60,h:100};

// INPUT
document.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(e.key===" ") jumpBuffer=8;
});
document.addEventListener("keyup",e=>keys[e.key]=false);

canvas.addEventListener("click",()=>{
  if(gameState!=="playing") startGame();
});

// MOBILE BUTTONS
leftBtn.ontouchstart=()=>touchLeft=true;
leftBtn.ontouchend=()=>touchLeft=false;
rightBtn.ontouchstart=()=>touchRight=true;
rightBtn.ontouchend=()=>touchRight=false;
jumpBtn.ontouchstart=()=>jumpBuffer=8;

// START
function startGame(){
  level=1;
  player.hp=100;
  loadLevel();
  gameState="playing";
}

// LEVELS
function loadLevel(){

  platforms=[]; enemies=[]; boss=null; bossBullets=[];
  platforms.push({x:0,y:550,w:1000,h:50});

  if(level===1){
    platforms.push({x:200,y:480,w:120,h:20});
    platforms.push({x:400,y:430,w:120,h:20});
  }

  if(level===2){
    for(let i=0;i<4;i++){
      platforms.push({x:200+i*180,y:500-i*50,w:120,h:20});
    }
  }

  if(level===3){
    for(let i=0;i<5;i++){
      platforms.push({x:100+i*180,y:400+(i%2)*80,w:120,h:20});
    }
  }

  if(level===4){
    for(let i=0;i<5;i++){
      platforms.push({x:300,y:500-i*80,w:120,h:20});
    }
  }

  if(level===5){
    platforms.push({x:400,y:400,w:200,h:20});
    boss={x:700,y:300,r:30,hp:20,speed:1.2,cooldown:60};
  }

  if(level===6){
    platforms.push({x:150,y:500,w:120,h:20});
    platforms.push({x:350,y:450,w:120,h:20});
    platforms.push({x:200,y:380,w:120,h:20});
    platforms.push({x:450,y:320,w:120,h:20});
    platforms.push({x:300,y:260,w:120,h:20});
  }

  if(level===7){
    platforms.push({x:200,y:500,w:100,h:20});
    platforms.push({x:400,y:450,w:100,h:20});
    platforms.push({x:600,y:400,w:100,h:20});
    platforms.push({x:800,y:350,w:100,h:20});
  }

  if(level===8){
    platforms.push({x:150,y:500,w:120,h:20});
    platforms.push({x:300,y:420,w:120,h:20});
    platforms.push({x:450,y:500,w:120,h:20});
    platforms.push({x:600,y:420,w:120,h:20});
    platforms.push({x:750,y:500,w:120,h:20});
  }

  if(level===9){
    platforms.push({x:400,y:500,w:120,h:20});
    platforms.push({x:400,y:420,w:120,h:20});
    platforms.push({x:400,y:340,w:120,h:20});
    platforms.push({x:400,y:260,w:120,h:20});
  }

  if(level===10){
    platforms.push({x:350,y:400,w:300,h:20});
    boss={x:700,y:250,r:35,hp:50,speed:2,cooldown:60};
  }

  // PUZZLES
  if(level===11){
    platforms.push({x:200,y:500,w:80,h:20});
    platforms.push({x:350,y:450,w:80,h:20});
    platforms.push({x:500,y:400,w:80,h:20});
    platforms.push({x:650,y:350,w:80,h:20});
  }

  if(level===12){
    platforms.push({x:200,y:500,w:120,h:20});
    platforms.push({x:400,y:450,w:120,h:20});
    platforms.push({x:300,y:350,w:120,h:20});
    platforms.push({x:600,y:300,w:120,h:20});
  }

  if(level===13){
    platforms.push({x:250,y:500,w:60,h:20});
    platforms.push({x:350,y:450,w:60,h:20});
    platforms.push({x:450,y:400,w:60,h:20});
    platforms.push({x:550,y:350,w:60,h:20});
  }

  if(level===14){
    platforms.push({x:300,y:500,w:100,h:20});
    platforms.push({x:500,y:420,w:100,h:20});
    platforms.push({x:300,y:340,w:100,h:20});
    platforms.push({x:500,y:260,w:100,h:20});
  }

  if(level===15){
    platforms.push({x:350,y:400,w:300,h:20});
    boss={x:700,y:250,r:35,hp:50,speed:2.2,cooldown:60};
  }

  if(!boss){
    for(let i=0;i<Math.min(level,5);i++){
      enemies.push({x:200+i*150,y:520,dir:1,speed:1.2});
    }
  }

  player.x=100;
  player.y=400;
}

// PLAYER
function movePlayer(){

  if(keys["ArrowLeft"]||touchLeft) player.vx-=player.speed;
  if(keys["ArrowRight"]||touchRight) player.vx+=player.speed;

  player.vx*=0.9;
  player.vy+=player.gravity;

  player.x+=player.vx;
  player.y+=player.vy;

  player.onGround=false;

  platforms.forEach(p=>{
    if(player.vy>=0 &&
       player.x>p.x &&
       player.x<p.x+p.w &&
       player.y+player.r>p.y &&
       player.y+player.r<p.y+20){
      player.y=p.y-player.r;
      player.vy=0;
      player.onGround=true;
    }
  });

  if(player.onGround) coyoteTime=8;
  else coyoteTime--;

  if(jumpBuffer>0) jumpBuffer--;

  if(jumpBuffer>0 && coyoteTime>0){
    player.vy=player.jump;
    jumpBuffer=0;
    coyoteTime=0;
  }

  if(!keys[" "] && player.vy<0){
    player.vy+=0.3;
  }

  if(player.y>550-player.r){
    player.y=550-player.r;
    player.vy=0;
    player.onGround=true;
  }

  if(player.x<0) player.x=0;
  if(player.x>1000) player.x=1000;
}

// ENEMIES
function moveEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    e.x+=e.dir*e.speed;
    if(e.x<50||e.x>950) e.dir*=-1;

    let dx=Math.abs(player.x-e.x);
    let dy=player.y-e.y;

    if(dx<20 && dy<0 && dy>-30 && player.vy>0){
      enemies.splice(i,1);
      player.vy=-7;
      continue;
    }

    if(dx<20 && Math.abs(dy)<20){
      player.hp-=0.5;
    }
  }
}

// BOSS
function moveBoss(){
  if(!boss) return;

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  boss.x+=dx/dist*boss.speed;
  boss.y+=dy/dist*boss.speed;

  boss.cooldown--;
  if(boss.cooldown<=0){
    bossBullets.push({
      x:boss.x,
      y:boss.y,
      vx:(dx/dist)*4,
      vy:(dy/dist)*4
    });
    boss.cooldown=60;
  }

  if(Math.abs(player.x-boss.x)<35 &&
     Math.abs(player.y-boss.y)<35 &&
     player.vy>0){
    boss.hp--;
    player.vy=-8;
  }

  if(Math.abs(player.x-boss.x)<35 &&
     Math.abs(player.y-boss.y)<35){
    player.hp-=1;
  }

  if(boss.hp<=0){

    // ⭐ RESET AFTER LEVEL 5 AND 10
    if(level===5 || level===10){
      player.hp=100;
    }

    if(level===15){
      gameState="win";
    } else {
      level++;
      loadLevel();
    }
  }
}

// BOSS BULLETS
function moveBossBullets(){
  for(let i=bossBullets.length-1;i>=0;i--){
    let b=bossBullets[i];
    b.x+=b.vx;
    b.y+=b.vy;

    if(Math.abs(player.x-b.x)<15 &&
       Math.abs(player.y-b.y)<15){
      player.hp-=5;
      bossBullets.splice(i,1);
      continue;
    }

    if(b.x<0||b.x>1000||b.y<0||b.y>600){
      bossBullets.splice(i,1);
    }
  }
}

// PORTAL
function checkPortal(){
  if(!boss && player.x>900){
    level++;
    loadLevel();
  }
}

// DRAW
function draw(){

  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,200);
    ctx.font="20px Arial";
    ctx.fillText("Tap or Click to Start",350,300);
    return;
  }

  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN!",400,250);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",350,250);
    return;
  }

  ctx.fillStyle="#555";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  if(!boss){
    ctx.fillStyle="yellow";
    ctx.fillRect(900,450,60,100);
  }

  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="orange";
  bossBullets.forEach(b=>{
    ctx.fillRect(b.x,b.y,6,6);
  });

  if(boss){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillText("Boss HP: "+boss.hp,450,50);
  }

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillText("Level:"+level+" HP:"+Math.floor(player.hp),20,20);
}

// LOOP
function loop(){

  if(gameState==="playing"){
    movePlayer();
    moveEnemies();
    moveBoss();
    moveBossBullets();
    checkPortal();

    if(player.hp<=0) gameState="gameover";
  }

  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
