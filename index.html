<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Clone (Unified System)</title>
<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:rgba(0,0,0,.6);
 display:flex; align-items:center; justify-content:center;
 flex-direction:column; color:white;
}
</style>
</head>
<body>

<div id="overlay">
<h1>Click to Play</h1>
<button id="startBtn">Start</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

// ===== DATA =====
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshLambertMaterial({color:0x55aa55});

const blocks = new Map();
const heightMap = new Map();

function key(x,y,z){ return `${x},${y},${z}`; }
function colKey(x,z){ return `${x},${z}`; }

function hasBlock(x,y,z){
 return blocks.has(key(x,y,z));
}

function getGround(x,z){
 return heightMap.get(colKey(x,z)) ?? -5;
}

// ===== CHUNKS =====
const CHUNK_SIZE = 16;
const RENDER_DISTANCE = 2;
const chunks = new Map();

function chunkKey(cx,cz){ return `${cx},${cz}`; }
function noise(x,z){ return Math.sin(x*0.1)*Math.cos(z*0.1); }

function generateChunk(cx,cz){
 const k = chunkKey(cx,cz);
 if(chunks.has(k)) return;

 const group = new THREE.Group();

 for(let x=0;x<CHUNK_SIZE;x++){
  for(let z=0;z<CHUNK_SIZE;z++){

   const worldX = cx*CHUNK_SIZE + x;
   const worldZ = cz*CHUNK_SIZE + z;
   const h = Math.floor(noise(worldX,worldZ)*5);

   heightMap.set(colKey(worldX,worldZ), h);

   for(let y=-5;y<=h;y++){
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(worldX,y,worldZ);

    group.add(mesh);
    blocks.set(key(worldX,y,worldZ), mesh);
   }
  }
 }

 scene.add(group);
 chunks.set(k, group);
}

function updateChunks(){
 const cx = Math.floor(camera.position.x / CHUNK_SIZE);
 const cz = Math.floor(camera.position.z / CHUNK_SIZE);

 for(let x=-RENDER_DISTANCE;x<=RENDER_DISTANCE;x++){
  for(let z=-RENDER_DISTANCE;z<=RENDER_DISTANCE;z++){
   generateChunk(cx+x, cz+z);
  }
 }

 for(const [k, group] of chunks){
  const [x,z] = k.split(',').map(Number);

  if(Math.abs(x-cx)>RENDER_DISTANCE || Math.abs(z-cz)>RENDER_DISTANCE){

   group.children.forEach(mesh=>{
    const {x,y,z} = mesh.position;
    blocks.delete(key(x,y,z));
   });

   scene.remove(group);
   chunks.delete(k);
  }
 }
}

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

startBtn.onclick = ()=>controls.lock();

controls.addEventListener('lock',()=>overlay.style.display='none');
controls.addEventListener('unlock',()=>overlay.style.display='flex');

document.addEventListener('click', (e)=>{
 if(e.target.id !== "startBtn" && !controls.isLocked){
  controls.lock();
 }
});

// ===== PLAYER =====
let velocityY = 0;
const playerHeight = 1.8;

let moveQueue = [];
let moveCooldown = 0;
const MOVE_DELAY = 0.12;

camera.position.set(0,10,0);

// INPUT
window.addEventListener('keydown',e=>{
 if(e.code==='KeyW') moveQueue.push({x:0,z:-1});
 if(e.code==='KeyS') moveQueue.push({x:0,z:1});
 if(e.code==='KeyA') moveQueue.push({x:-1,z:0});
 if(e.code==='KeyD') moveQueue.push({x:1,z:0});

 if(e.code==='Space' && velocityY === 0){
  velocityY = 0.25;
 }
});

// COLLISION
function canStand(x,z,y){
 const px = Math.round(x);
 const pz = Math.round(z);

 for(let dy=0; dy<2; dy++){
  if(hasBlock(px, Math.floor(y)-dy, pz)){
   return false;
  }
 }
 return true;
}

function tryMove(dx,dz){
 const tx = Math.round(camera.position.x) + dx;
 const tz = Math.round(camera.position.z) + dz;
 const ground = getGround(tx,tz);

 const targetY = ground + playerHeight;

 // allow stepping up 1 block
 if(targetY - camera.position.y <= 1.1){
  if(canStand(tx,tz,targetY)){
   camera.position.x = tx;
   camera.position.z = tz;
   camera.position.y = targetY;
   return true;
  }
 }

 return false;
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateChunks();

 // movement
 moveCooldown -= 0.016;

 if(moveCooldown<=0 && moveQueue.length){
  const step = moveQueue.shift();
  if(tryMove(step.x, step.z)){
   moveCooldown = MOVE_DELAY;
  }
 }

 // gravity
 velocityY -= 0.01;
 camera.position.y += velocityY;

 const ground = getGround(camera.position.x, camera.position.z);
 const floor = ground + playerHeight;

 if(camera.position.y <= floor){
  camera.position.y = floor;
  velocityY = 0;
 }

 renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener('resize',()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
