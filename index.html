```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena FINAL FIXED</title>
<style>
body { margin:0; background:#111; text-align:center; overflow:hidden; color:white; }
canvas { background:#222; display:block; margin:auto; }
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<button onclick="startGame()">Start</button>
<div id="stats"></div>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let level=1;
let gameState="menu";
let cameraX=0;

// ===== PLAYER =====
let player={
  x:100,y:400,
  vx:0,vy:0,
  radius:15,
  speed:0.5,
  jumpPower:-13,
  gravity:0.6,
  onGround:false,
  energy:100
};

let keys={};
let jumpPressed=false;

// ===== WORLD =====
let platforms=[], enemies=[], boss=null;
let portal={x:1800,y:300,w:60,h:120};

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(e.key===" " && !jumpPressed){
    if(player.onGround){
      player.vy = player.jumpPower;
      player.onGround=false;
    }
    jumpPressed=true;
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key]=false;
  if(e.key===" ") jumpPressed=false;
});

// ===== LEVEL GENERATION =====
function generateLevel(){
  platforms=[];
  enemies=[];
  boss=null;

  // ground
  platforms.push({x:0,y:550,w:2000,h:50});

  // platforms (STATIC per level)
  for(let i=0;i<8;i++){
    platforms.push({
      x:200+i*200,
      y:250+Math.random()*200,
      w:120,
      h:20
    });
  }

  // portal ALWAYS at end
  portal.x=1800;
  portal.y=450;

  if(level<5){
    for(let i=0;i<level+2;i++){
      enemies.push({
        x:300+i*250,
        y:520,
        dir:1,
        speed:1.2   // FIXED SPEED
      });
    }
  }else{
    boss={
      x:1500,y:300,
      radius:25,
      hp:40,
      shootCooldown:0
    };
  }
}

// ===== PLAYER =====
function movePlayer(){

  if(keys["ArrowLeft"]) player.vx -= player.speed;
  if(keys["ArrowRight"]) player.vx += player.speed;

  player.vx *= 0.9;

  // variable jump height (smooth)
  if(!keys[" "] && player.vy < 0){
    player.vy += 0.4;
  }

  player.vy += player.gravity;

  player.x += player.vx;
  player.y += player.vy;

  // collisions
  player.onGround=false;
  platforms.forEach(p=>{
    if(player.x > p.x && player.x < p.x+p.w &&
       player.y + player.radius > p.y &&
       player.y < p.y + p.h){
      player.y = p.y - player.radius;
      player.vy = 0;
      player.onGround=true;
    }
  });

  // HARD FLOOR (no falling)
  if(player.y > 550 - player.radius){
    player.y = 550 - player.radius;
    player.vy = 0;
    player.onGround = true;
  }

  // walls
  if(player.x < 0) player.x = 0;
  if(player.x > 2000) player.x = 2000;
}

// ===== ENEMIES =====
function moveEnemies(){
  enemies.forEach(e=>{
    e.x += e.dir * e.speed;

    if(e.x < 50 || e.x > 1950){
      e.dir *= -1;
    }

    if(Math.abs(player.x - e.x) < 20 && Math.abs(player.y - e.y) < 20){
      player.energy -= 0.3;
    }
  });
}

// ===== BOSS =====
function moveBoss(){
  if(!boss) return;

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  boss.x += dx/dist*1.5;
  boss.y += dy/dist*1.5;

  if(Math.abs(player.x-boss.x)<30 && Math.abs(player.y-boss.y)<30 && player.vy>0){
    boss.hp--;
    player.vy=-8;
  }

  if(boss.hp<=0){
    gameState="win";
  }
}

// ===== PORTAL =====
function checkPortal(){
  if(
    player.x + player.radius > portal.x &&
    player.x - player.radius < portal.x + portal.w &&
    player.y + player.radius > portal.y &&
    player.y - player.radius < portal.y + portal.h
  ){
    level++;

    if(level > 5){
      gameState="win";
      return;
    }

    player.x=100;
    player.y=400;

    generateLevel(); // ONLY CALLED HERE
  }
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,1000,600);

  if(gameState==="menu"){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA",350,250);
    return;
  }

  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.fillText("GAME OVER",350,250);
    return;
  }

  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.fillText("YOU WIN!",350,250);
    return;
  }

  ctx.save();
  ctx.translate(-cameraX,0);

  // platforms
  ctx.fillStyle="#555";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  // portal (BIG + VISIBLE)
  ctx.fillStyle="yellow";
  ctx.fillRect(portal.x,portal.y,portal.w,portal.h);

  // enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  // boss
  if(boss){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.radius,0,Math.PI*2);
    ctx.fill();
  }

  // player
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.radius,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  ctx.fillStyle="white";
  ctx.fillText("Level: "+level+" HP: "+Math.floor(player.energy),20,20);
}

// ===== LOOP =====
function loop(){
  movePlayer();
  moveEnemies();
  moveBoss();
  checkPortal();

  cameraX += (player.x-400-cameraX)*0.1;

  draw();

  if(player.energy<=0){
    gameState="gameover";
    return;
  }

  requestAnimationFrame(loop);
}

// ===== START =====
function startGame(){
  gameState="playing";
  level=1;
  player.energy=100;
  generateLevel();
  loop();
}
</script>

</body>
</html>
