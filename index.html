<!DOCTYPE html>
<html>
<head>
<title>Ball Arena FINAL</title>
<style>
body { margin:0; background:#111; color:white; text-align:center; }
canvas { background:#222; display:block; margin:auto; }
</style>
</head>
<body>

<h2>Ball Arena 🎮</h2>
<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameState = "menu";
let level = 1;

// =====================
// PLAYER
// =====================
let player = {
  x:100,y:400,
  vx:0,vy:0,
  r:15,
  speed:0.5,
  jump:-8,
  gravity:0.4,
  onGround:false,
  hp:100
};

let keys = {};
let jumpBuffer = 0;
let coyoteTime = 0;

// =====================
// WORLD
// =====================
let platforms = [];
let enemies = [];
let boss = null;
let portal = {x:900,y:450,w:60,h:100};

// =====================
// INPUT
// =====================
document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(e.key===" ") jumpBuffer=8;
});
document.addEventListener("keyup", e=>{
  keys[e.key]=false;
});

// CLICK TO START / RESTART
canvas.addEventListener("click", ()=>{
  if(gameState==="menu" || gameState==="win" || gameState==="gameover"){
    startGame();
  }
});

// =====================
// START GAME
// =====================
function startGame(){
  level=1;
  player.hp=100;
  loadLevel();
  gameState="playing";
}

// =====================
// LEVELS
// =====================
function loadLevel(){

  platforms=[];
  enemies=[];
  boss=null;

  platforms.push({x:0,y:550,w:1000,h:50});

  if(level===1){
    platforms.push({x:200,y:480,w:120,h:20});
    platforms.push({x:400,y:430,w:120,h:20});
  }

  if(level===2){
    for(let i=0;i<4;i++){
      platforms.push({x:200+i*180,y:500-i*50,w:120,h:20});
    }
  }

  if(level===3){
    for(let i=0;i<5;i++){
      platforms.push({x:100+i*180,y:400+(i%2)*80,w:120,h:20});
    }
  }

  if(level===4){
    for(let i=0;i<5;i++){
      platforms.push({x:300,y:500-i*80,w:120,h:20});
    }
  }

  if(level===5){
    platforms.push({x:400,y:400,w:200,h:20});
    boss = {x:700,y:300,r:30,hp:20};
  }

  if(level<5){
    for(let i=0;i<level;i++){
      enemies.push({
        x:300+i*200,
        y:520,
        dir:1,
        speed:1
      });
    }
  }

  portal.x=900;
  portal.y=450;

  player.x=100;
  player.y=400;
}

// =====================
// PLAYER MOVE
// =====================
function movePlayer(){

  if(keys["ArrowLeft"]) player.vx -= player.speed;
  if(keys["ArrowRight"]) player.vx += player.speed;

  player.vx *= 0.9;

  player.vy += player.gravity;

  player.x += player.vx;
  player.y += player.vy;

  player.onGround=false;

  platforms.forEach(p=>{
    if(player.vy>=0 &&
       player.x>p.x &&
       player.x<p.x+p.w &&
       player.y+player.r>p.y &&
       player.y+player.r<p.y+20){
      player.y=p.y-player.r;
      player.vy=0;
      player.onGround=true;
    }
  });

  if(player.y>550-player.r){
    player.y=550-player.r;
    player.vy=0;
    player.onGround=true;
  }

  if(player.onGround) coyoteTime=8;
  else coyoteTime--;

  if(jumpBuffer>0) jumpBuffer--;

  if(jumpBuffer>0 && coyoteTime>0){
    player.vy=player.jump;
    jumpBuffer=0;
    coyoteTime=0;
  }

  if(!keys[" "] && player.vy<0){
    player.vy+=0.3;
  }

  if(player.x<0) player.x=0;
  if(player.x>1000) player.x=1000;
}

// =====================
// ENEMIES (KILLABLE)
// =====================
function moveEnemies(){

  for(let i=enemies.length-1;i>=0;i--){
    let e = enemies[i];

    e.x += e.dir * e.speed;

    if(e.x<50||e.x>950) e.dir*=-1;

    let dx = Math.abs(player.x - e.x);
    let dy = player.y - e.y;

    // stomp
    if(dx < 20 && dy < 0 && dy > -30 && player.vy > 0){
      enemies.splice(i,1);
      player.vy = -7;
      continue;
    }

    // damage
    if(dx < 20 && Math.abs(dy) < 20){
      player.hp -= 0.5;
    }
  }
}

// =====================
// BOSS
// =====================
function moveBoss(){
  if(!boss) return;

  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  boss.x += dx/dist * 1.2;
  boss.y += dy/dist * 1.2;

  if(Math.abs(player.x-boss.x)<30 &&
     Math.abs(player.y-boss.y)<30 &&
     player.vy>0){
    boss.hp--;
    player.vy=-7;
  }

  if(Math.abs(player.x-boss.x)<30 &&
     Math.abs(player.y-boss.y)<30){
    player.hp -= 1;
  }

  if(boss.hp<=0){
    gameState="win";
  }
}

// =====================
// PORTAL
// =====================
function checkPortal(){
  if(level<5 && player.x>portal.x){
    level++;
    loadLevel();
  }
}

// =====================
// DRAW
// =====================
function draw(){

  ctx.clearRect(0,0,1000,600);

  // MENU
  if(gameState==="menu"){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("BALL ARENA", 350, 200);

    ctx.font="20px Arial";
    ctx.fillText("Click to Start", 420, 300);
    return;
  }

  // WIN
  if(gameState==="win"){
    ctx.fillStyle="gold";
    ctx.font="40px Arial";
    ctx.fillText("YOU WIN!", 380, 250);

    ctx.font="20px Arial";
    ctx.fillText("Click to Restart", 400, 320);
    return;
  }

  // GAME OVER
  if(gameState==="gameover"){
    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER", 360, 250);

    ctx.font="20px Arial";
    ctx.fillText("Click to Restart", 400, 320);
    return;
  }

  // GAME
  ctx.fillStyle="#555";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  if(level<5){
    ctx.fillStyle="yellow";
    ctx.fillRect(portal.x,portal.y,portal.w,portal.h);
  }

  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  if(boss){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText("Boss HP: "+boss.hp,450,50);
  }

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="white";
  ctx.fillText("Level: "+level+" HP:"+Math.floor(player.hp),20,20);
}

// =====================
// LOOP
// =====================
function loop(){

  if(gameState==="playing"){
    movePlayer();
    moveEnemies();
    moveBoss();
    checkPortal();

    if(player.hp<=0){
      gameState="gameover";
    }
  }

  draw();
  requestAnimationFrame(loop);
}

// START LOOP ONLY
loop();

</script>

</body>
</html>
