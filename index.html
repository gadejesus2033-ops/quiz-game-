```html
<!DOCTYPE html>
<html>
<head>
<title>Ball Arena ULTIMATE FINAL++</title>
<style>
body { margin:0; background:#111; color:white; font-family:Arial; text-align:center; overflow:hidden; }
canvas { background:#222; display:block; margin:auto; }
#ui { padding:10px; }
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<div id="ui">
<button onclick="startGame()">Start</button>
<div id="stats"></div>
<div id="question"></div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;
let running = false;
let cameraX = 0;
let worldWidth = 2000;

// ===== PLAYER =====
let player = {
  x:100, y:500,
  vx:0, vy:0,
  energy:10000,
  speed:3,

  // ✅ HIGHER JUMP
  jump:-14,

  // ✅ BETTER GRAVITY
  gravity:0.45,

  onGround:false,
  jumps:0,
  maxJumps:2
};

const keys = {};
document.addEventListener("keydown", e=>{
  keys[e.key]=true;

  if(e.key==="f"){
    bullets.push({x:player.x,y:player.y,vx:7});
  }
});
document.addEventListener("keyup", e=>keys[e.key]=false);

// ===== OBJECTS =====
let dogs = [];
let bullets = [];
let coins = [];
let hazards = [];
let movingPlatform = {x:600,y:350,w:120,h:20,dir:1};

// ===== LEVEL SETUP =====
function setupLevel(){
  dogs = getDogs();
  spawnCoins();

  hazards = [
    {x:800,y:540,w:150,h:10},
    {x:1400,y:540,w:150,h:10}
  ];

  if(level === 5){
    dogs = [{x:1500,y:400,hp:40,dir:1,speed:2,boss:true}];
  }
}

// ===== PLATFORMS =====
function getPlatforms(){
  return [
    {x:0,y:550,w:2000,h:50},
    {x:300,y:450,w:150,h:20},
    {x:600,y:380,w:150,h:20},
    movingPlatform,
    {x:1200,y:320,w:150,h:20},
    {x:1500,y:260,w:150,h:20}
  ];
}

// ===== ENEMIES =====
function getDogs(){
  let enemies=[];
  for(let i=0;i<level+3;i++){
    let t=Math.floor(Math.random()*3);
    let x=300+i*300;

    if(t===0) enemies.push({x,y:520,dir:1,speed:0.6,type:"tank"});
    if(t===1) enemies.push({x,y:520,dir:1,speed:2.5,type:"fast"});
    if(t===2) enemies.push({x,y:520,dir:1,speed:1.2,type:"jumper",vy:0});
  }
  return enemies;
}

// ===== COINS =====
function spawnCoins(){
  coins=[];
  for(let i=0;i<15;i++){
    coins.push({
      x:Math.random()*worldWidth,
      y:Math.random()*400+100
    });
  }
}

// ===== QUESTIONS =====
let currentQ;

function makeQuestion(){
  let a=Math.floor(Math.random()*20)+1;
  let b=Math.floor(Math.random()*20)+1;

  let correct = (level>=3)?a*b:a+b;
  let answers=[correct,correct+2,correct-1,correct+4];
  answers.sort(()=>Math.random()-0.5);

  currentQ={correct};

  let html="<b>"+a+(level>=3?" × ":" + ")+b+" = ?</b><br>";
  answers.forEach(ans=>{
    html+=`<button onclick="check(${ans})">${ans}</button>`;
  });

  document.getElementById("question").innerHTML=html;
}

function check(ans){
  if(ans===currentQ.correct){
    player.energy+=1000;
  } else {
    player.energy-=200;
  }
  makeQuestion();
}

// ===== MOVEMENT =====
function move(){
  if(player.energy<=0) return;

  if(keys["ArrowLeft"]) player.vx-=0.4;
  if(keys["ArrowRight"]) player.vx+=0.4;

  player.vx*=0.9;

  // ✅ DOUBLE JUMP + HIGHER JUMP
  if(keys[" "] && player.jumps < player.maxJumps){
    player.vy = player.jump * (player.jumps === 0 ? 1 : 0.8);
    player.jumps++;
  }

  // ✅ VARIABLE JUMP HEIGHT
  if(keys[" "]){
    player.vy += player.gravity * 0.6;
  } else {
    player.vy += player.gravity * 1.2;
  }

  player.x+=player.vx;
  player.y+=player.vy;

  player.onGround=false;

  getPlatforms().forEach(p=>{
    if(player.x>p.x && player.x<p.x+p.w &&
       player.y+15>p.y && player.y<p.y+p.h){
      player.y=p.y-15;
      player.vy=0;
      player.onGround=true;
      player.jumps = 0;
    }
  });

  player.energy-=0.2;
}

// ===== CAMERA =====
function updateCamera(){
  cameraX = player.x - 400;
  if(cameraX < 0) cameraX = 0;
  if(cameraX > worldWidth - 1000){
    cameraX = worldWidth - 1000;
  }
}

// ===== MOVING PLATFORM =====
function movePlatforms(){
  movingPlatform.x+=movingPlatform.dir*2;
  if(movingPlatform.x<500||movingPlatform.x>900){
    movingPlatform.dir*=-1;
  }
}

// ===== ENEMIES =====
function moveDogs(){
  for(let i=dogs.length-1;i>=0;i--){
    let d=dogs[i];

    d.x+=d.dir*d.speed;
    if(d.x<0||d.x>worldWidth) d.dir*=-1;

    if(d.type==="jumper"){
      d.vy+=0.5;
      d.y+=d.vy;
      if(d.y>520){d.y=520; d.vy=-9;}
    }

    let dx=Math.abs(player.x-d.x);
    let dy=player.y-d.y;

    if(dx<25 && dy>-25 && dy<0 && player.vy>0){
      if(d.boss){
        d.hp--;
        if(d.hp<=0){
          alert("YOU WIN!");
          location.reload();
        }
      } else {
        dogs.splice(i,1);
      }
      player.vy=-8;
      continue;
    }

    if(dx<25 && Math.abs(player.y-d.y)<25){
      player.energy-=3;
    }
  }
}

// ===== BULLETS =====
function moveBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.x+=b.vx;

    if(b.x>worldWidth) bullets.splice(i,1);

    for(let j=dogs.length-1;j>=0;j--){
      let d=dogs[j];
      if(Math.abs(b.x-d.x)<15 && Math.abs(b.y-d.y)<15){
        if(d.boss){ d.hp--; }
        else { dogs.splice(j,1); }
        bullets.splice(i,1);
        break;
      }
    }
  }
}

// ===== COINS =====
function collectCoins(){
  for(let i=coins.length-1;i>=0;i--){
    let c=coins[i];
    if(Math.abs(player.x-c.x)<20 && Math.abs(player.y-c.y)<20){
      coins.splice(i,1);
      player.energy+=50;
    }
  }
}

// ===== HAZARDS =====
function checkHazards(){
  hazards.forEach(h=>{
    if(player.x>h.x && player.x<h.x+h.w && player.y>h.y){
      player.energy-=5;
    }
  });
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,1000,600);

  ctx.save();
  ctx.translate(-cameraX,0);

  ctx.fillStyle="#444";
  getPlatforms().forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  ctx.fillStyle="red";
  hazards.forEach(h=>ctx.fillRect(h.x,h.y,h.w,h.h));

  ctx.fillStyle="yellow";
  coins.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,8,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="brown";
  dogs.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,15,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="red";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5));

  ctx.beginPath();
  ctx.arc(player.x,player.y,15,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();

  ctx.fillStyle="gold";
  ctx.fillRect(1800,200,30,200);

  ctx.restore();
}

// ===== LOOP =====
function loop(){
  move();
  movePlatforms();
  moveDogs();
  moveBullets();
  collectCoins();
  checkHazards();
  updateCamera();
  draw();

  document.getElementById("stats").innerText =
    "Level: "+level+" | Energy: "+Math.floor(player.energy);

  if(player.energy<=0){
    alert("Game Over!");
    location.reload();
    return;
  }

  requestAnimationFrame(loop);
}

// ===== START =====
function startGame(){
  if(running) return;
  running=true;
  setupLevel();
  makeQuestion();
  loop();
}
</script>

</body>
</html>
```
