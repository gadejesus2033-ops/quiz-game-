<!DOCTYPE html>

<html>
<head>
  <title>Ball Arena Codes</title>
  <style>
    body { margin:0; background:#111; color:white; font-family:Arial; text-align:center; }
    canvas { background:#222; display:block; margin:auto; }
    input, button { padding:8px; margin:5px; }
    #ui { padding:10px; }
  </style>
</head>
<body>

<div id="ui">
  <input id="name" placeholder="Name">
  <input id="code" placeholder="Room Code (create or join)">
  <button onclick="startGame()">Start / Join</button>
  <div id="stats"></div>
  <div id="questionBox"></div>
</div>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let room = "";
let playerName = "";

let players = {}; // all players in room

let player = {
  x: 100,
  y: 100,
  energy: 1500,
  color: "red",
  speed: 3
};

const keys = {};

const questions = [
  { q: "2 + 2?", a: 4 },
  { q: "5 x 3?", a: 15 },
  { q: "10 - 6?", a: 4 },
  { q: "6 + 7?", a: 13 }
];

let qIndex = 0;

// 🔑 fake shared storage (same browser tab system)
let storage = {};

function startGame() {
  playerName = document.getElementById("name").value;
  room = document.getElementById("code").value;

  if (!playerName || !room) return alert("Enter name + code");

  if (!storage[room]) storage[room] = {};

  players = storage[room];

  player.color = randomColor();
  players[playerName] = player;

  loadQuestion();
  loop();
}

function randomColor() {
  const colors = ["red","blue","lime","yellow","purple","cyan"];
  return colors[Math.floor(Math.random()*colors.length)];
}

// movement
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function move() {
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
}

function loadQuestion() {
  const q = questions[qIndex];
  document.getElementById("questionBox").innerHTML =
    q.q + " <button onclick='answer(true)'>Answer Correct</button>";
}

window.answer = function(correct) {
  if (correct) {
    player.energy += 1000;
  } else {
    player.energy -= 300;
  }

  qIndex = (qIndex + 1) % questions.length;
  loadQuestion();
  sync();
}

function sync() {
  storage[room][playerName] = player;
}

function draw() {
  ctx.clearRect(0,0,600,400);

  for (let p in players) {
    let pl = players[p];

    ctx.beginPath();
    ctx.arc(pl.x, pl.y, 15, 0, Math.PI*2);
    ctx.fillStyle = pl.color;
    ctx.fill();
  }
}

function loop() {
  move();
  sync();
  draw();

  document.getElementById("stats").innerText =
    "Energy: " + player.energy + " | Room: " + room;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
